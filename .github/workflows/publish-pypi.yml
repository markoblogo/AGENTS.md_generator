name: Publish PyPI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to publish (for retry/manual publish)"
        required: true
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: pypi-publish-${{ github.event.release.tag_name || inputs.tag }}
  cancel-in-progress: false

jobs:
  publish-pypi:
    if: github.event_name != 'release' || github.event.release.prerelease == false
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - name: Resolve tag
        id: ref
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          tag="${RELEASE_TAG:-$INPUT_TAG}"
          if [ -z "$tag" ]; then
            echo "Missing release tag." >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.ref.outputs.tag }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify tag matches package version
        run: |
          python - <<'PY'
          import pathlib
          import tomllib

          tag = "${{ steps.ref.outputs.tag }}"
          version = tomllib.loads(pathlib.Path("pyproject.toml").read_text())["project"]["version"]
          expected = f"v{version}"
          if tag != expected:
              raise SystemExit(f"Tag/version mismatch: tag={tag}, pyproject={expected}")
          print(f"Publishing {expected}")
          PY

      - name: Build package
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
